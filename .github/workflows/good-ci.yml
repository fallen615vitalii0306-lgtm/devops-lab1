name: Good CI

on:
  push:
    paths-ignore:
      - '**.md'

jobs:
  lint:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - run: pip install flake8
      - run: echo "Lint passed"

  test:
    runs-on: ubuntu-22.04
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - run: echo "Run tests"

  security:
    runs-on: ubuntu-22.04
    needs: test
    steps:
      - uses: actions/checkout@v4
      - run: pip install bandit
      - run: bandit -r .

  build:
    runs-on: ubuntu-22.04
    needs: security
    steps:
      - uses: actions/checkout@v4
      - run: echo "Build step"

  deploy:
    runs-on: ubuntu-22.04
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Deploy
        env:
          TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: echo "Deploying safely"
